version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rpa-poc-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads
      - backend-database:/app/database
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    networks:
      - rpa-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rpa-poc-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - rpa-network
    restart: unless-stopped

networks:
  rpa-network:
    driver: bridge

volumes:
  backend-uploads:
  backend-database:
