services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rpa-poc-backend
    ports:
      - "5000:5000"
    volumes:
      - backend-uploads:/app/uploads
      - backend-database:/app/database
    environment:
      - PORT=5000
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - UPLOAD_DIR=/app/uploads
      - DATA_DIR=/app/database
    networks:
      - rpa-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://backend:5000
    container_name: rpa-poc-frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - API_INTERNAL_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - rpa-network
    restart: unless-stopped

networks:
  rpa-network:
    driver: bridge

volumes:
  backend-uploads:
  backend-database:
